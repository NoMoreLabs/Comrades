  </g>
  <g id="layer-theguy2" clip-path="url(#clip-theguy2)">
    <image id="image-theguy2" x="0" y="0" width="448" height="64" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAcAAAABAAgMAAADwjE+MAAAADFBMVEUAAAAAAADt7e18iZ1SdviOAAAAAXRSTlMAQObYZgAAAIJJREFUeF7t0sENwzAMQ9GOpiGqDbJCOElH8KA9kwKqW4EA/91ki45i+PUPAAAAAAAAAPrtZY1yWfD8TsfLGuWycPY/MvfH876vin4t+XF+60R9WS3f7+zXzC/n+0Q9PhATZ38veWVePpHGFcbE2V9LXpmPiTQeye8rVC15638MAMAXKsU7mqPwn8sAAAAASUVORK5CYII=" preserveAspectRatio="none"/>
  </g>
  <rect id="click-capture" x="0" y="0" width="64" height="64" fill="#000000" fill-opacity="0" pointer-events="all"/>
</svg>

  <script>
(() => {
      const FRAME_SIZE = 64;
      const TICK_MS = 120;
      const AUTO_SPEED = 700;
      const CLICK_DELAY = 240;
      const HOLD_FINAL_COMBINATION = true;
      const COMBINATION_STAGE_SIZES = [2, 2, 3, 3, 4, 4, 5, 6];
      const INDIVIDUAL_STAGE_ORDER = ['building-main', 'building-2', 'building-3', 'platforms', 'theguy1', 'theguy2'];
      const PLAYBACK_SPEEDS = {
        'building-main': 1,
        'building-2': 1,
        'building-3': 1,
        'platforms': 1,
        'theguy1': 1,
        'theguy2': 1
      };
      const root = document.documentElement;
      const capture = document.getElementById('click-capture');
      const MAX_STAGE = 6 + COMBINATION_STAGE_SIZES.length;
      let stage = 0;
      let autoplayTimer = null;
      let clickTimer = null;
      let animationTimer = null;
      let lastCombinationKey = '';
      let resizeObserver = null;

      const layers = INDIVIDUAL_STAGE_ORDER.map((id) => {
        const frameCount = id === 'building-main' ? 3 : id === 'building-2' ? 4 : 6;
        return {
          id,
          frameCount,
          currentFrame: 0,
          isPlaying: false,
          playbackSpeed: PLAYBACK_SPEEDS[id],
          tickCounter: 0,
          image: document.getElementById(`image-${id}`)
        };
      });

      function applyFrame(layer) {
        layer.image.setAttribute('x', String(-(layer.currentFrame * FRAME_SIZE)));
      }

      function updateDisplayScale() {
        const parent = root.parentElement;
        let availableWidth = window.innerWidth || 640;
        let availableHeight = window.innerHeight || 640;

        if (parent) {
          const rect = parent.getBoundingClientRect();
          if (rect.width > 0) {
            availableWidth = rect.width;
          }
          if (rect.height > 0) {
            availableHeight = rect.height;
          }
        }

        const scale = Math.max(1, Math.floor(Math.min(availableWidth, availableHeight) / FRAME_SIZE));
        const displaySize = scale * FRAME_SIZE;
        root.setAttribute('width', String(displaySize));
        root.setAttribute('height', String(displaySize));
      }

      function applyAllFrames() {
        for (const layer of layers) {
          applyFrame(layer);
        }
      }

      function setActiveLayers(activeIds) {
        const activeSet = new Set(activeIds);
        for (const layer of layers) {
          if (activeSet.has(layer.id)) {
            layer.currentFrame = 0;
            layer.tickCounter = 0;
            layer.isPlaying = true;
          } else {
            layer.currentFrame = 0;
            layer.tickCounter = 0;
            layer.isPlaying = false;
          }
        }
        applyAllFrames();
      }

      function arraysMatch(a, b) {
        if (a.length !== b.length) {
          return false;
        }
        for (let i = 0; i < a.length; i += 1) {
          if (a[i] !== b[i]) {
            return false;
          }
        }
        return true;
      }

      function chooseRandomCombination(count) {
        if (count >= INDIVIDUAL_STAGE_ORDER.length) {
          const full = INDIVIDUAL_STAGE_ORDER.slice();
          lastCombinationKey = full.join('|');
          return full;
        }

        const previous = lastCombinationKey ? lastCombinationKey.split('|') : [];
        const pool = INDIVIDUAL_STAGE_ORDER.slice();
        let attempt = [];

        for (let tries = 0; tries < 24; tries += 1) {
          const available = pool.slice();
          attempt = [];
          while (attempt.length < count && available.length > 0) {
            const index = Math.floor(Math.random() * available.length);
            attempt.push(available.splice(index, 1)[0]);
          }
          attempt.sort((a, b) => INDIVIDUAL_STAGE_ORDER.indexOf(a) - INDIVIDUAL_STAGE_ORDER.indexOf(b));
          if (!arraysMatch(attempt, previous)) {
            lastCombinationKey = attempt.join('|');
            return attempt;
          }
        }

        attempt = INDIVIDUAL_STAGE_ORDER.slice(0, count);
        if (arraysMatch(attempt, previous)) {
          attempt = INDIVIDUAL_STAGE_ORDER.slice(-count);
        }
        lastCombinationKey = attempt.join('|');
        return attempt;
      }

      function applyStage() {
        if (stage === 0) {
          setActiveLayers([]);
          return;
        }

        if (stage <= INDIVIDUAL_STAGE_ORDER.length) {
          lastCombinationKey = '';
          setActiveLayers([INDIVIDUAL_STAGE_ORDER[stage - 1]]);
          return;
        }

        const combinationIndex = stage - (INDIVIDUAL_STAGE_ORDER.length + 1);
        const sizeIndex = Math.min(combinationIndex, COMBINATION_STAGE_SIZES.length - 1);
        const targetSize = COMBINATION_STAGE_SIZES[sizeIndex];
        setActiveLayers(chooseRandomCombination(targetSize));
      }

      function advanceStage() {
        if (stage < MAX_STAGE) {
          stage += 1;
        } else if (HOLD_FINAL_COMBINATION) {
          stage = MAX_STAGE;
        } else {
          stage = INDIVIDUAL_STAGE_ORDER.length + 1;
        }
        applyStage();
      }

      function updateAnimationTick() {
        for (const layer of layers) {
          if (!layer.isPlaying) {
            continue;
          }
          layer.tickCounter += 1;
          if (layer.tickCounter >= layer.playbackSpeed) {
            layer.tickCounter = 0;
            layer.currentFrame = (layer.currentFrame + 1) % layer.frameCount;
            applyFrame(layer);
          }
        }
      }

      function startAutoplay() {
        if (autoplayTimer !== null) {
          return;
        }
        autoplayTimer = window.setInterval(() => {
          advanceStage();
        }, AUTO_SPEED);
      }

      function stopAutoplay() {
        if (autoplayTimer === null) {
          return;
        }
        window.clearInterval(autoplayTimer);
        autoplayTimer = null;
      }

      function toggleAutoplay() {
        if (autoplayTimer === null) {
          startAutoplay();
        } else {
          stopAutoplay();
        }
      }

      function resetScene() {
        stopAutoplay();
        stage = 0;
        lastCombinationKey = '';
        setActiveLayers([]);
      }

      function focusRoot() {
        if (typeof root.focus === 'function') {
          root.focus();
        }
      }

      function handleClick(evt) {
        if (evt.button !== 0) {
          return;
        }
        evt.preventDefault();
        focusRoot();
        if (clickTimer !== null) {
          window.clearTimeout(clickTimer);
        }
        clickTimer = window.setTimeout(() => {
          clickTimer = null;
          advanceStage();
        }, CLICK_DELAY);
      }

      function handleDoubleClick(evt) {
        evt.preventDefault();
        focusRoot();
        if (clickTimer !== null) {
          window.clearTimeout(clickTimer);
          clickTimer = null;
        }
        toggleAutoplay();
      }

      function handleKeydown(evt) {
        const key = evt.key.toLowerCase();
        if (key === 'p') {
          evt.preventDefault();
          toggleAutoplay();
        } else if (key === 'c') {
          evt.preventDefault();
          advanceStage();
        } else if (key === 'r') {
          evt.preventDefault();
          resetScene();
        }
      }

      capture.addEventListener('click', handleClick);
      capture.addEventListener('dblclick', handleDoubleClick);
      root.addEventListener('keydown', handleKeydown);
      window.addEventListener('keydown', handleKeydown);
      window.addEventListener('resize', updateDisplayScale);
      if (window.ResizeObserver && root.parentElement) {
        resizeObserver = new ResizeObserver(updateDisplayScale);
        resizeObserver.observe(root.parentElement);
      }
      animationTimer = window.setInterval(updateAnimationTick, TICK_MS);
      updateDisplayScale();
      resetScene();
    })();
  </script>
</body>
